*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#020b18;color:#e2e8f0}
.gc{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px}
.gc-h:hover{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);transform:translateY(-2px);transition:all .2s}
.gi{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#e2e8f0;outline:none;width:100%}
.gi:focus{border-color:rgba(0,212,255,.4)}
.bp{background:linear-gradient(135deg,#00d4ff,#0099ff);color:#020b18;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:'Inter',sans-serif}
.bp:hover{opacity:.9}.bp:disabled{opacity:.4;cursor:not-allowed}
.gt{background:linear-gradient(135deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gg{background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pg{animation:pg 2s infinite}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.4}}
.fa{animation:fa 1.5s ease-in-out infinite alternate}
@keyframes fa{0%{transform:scale(1) rotate(-3deg)}100%{transform:scale(1.1) rotate(3deg)}}
.td{animation:td 1.4s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.hc{width:22px;height:22px;border-radius:50%;border:2px solid rgba(0,212,255,.4);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hc.ck{background:linear-gradient(135deg,#00d4ff,#0099ff);border-color:transparent}
.ap{animation:ap .3s ease}
@keyframes ap{0%{transform:scale(.9);opacity:0}100%{transform:scale(1);opacity:1}}
.sb{position:fixed;left:0;top:0;height:100vh;width:220px;background:rgba(2,11,24,.97);border-right:1px solid rgba(255,255,255,.06);z-index:40;display:flex;flex-direction:column;padding:20px 12px;transform:translateX(-220px);transition:transform .25s ease}
@media(min-width:768px){.sb{transform:translateX(0)!important}}
.sb.mobile-open{transform:translateX(0)!important}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
textarea{resize:none}
.slide-in{animation:si .4s ease}
@keyframes si{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
input[type=range]{cursor:pointer}
`;

function useIsMobile() {
  const [isMobile, setIsMobile] = React.useState(typeof window !== 'undefined' ? window.innerWidth < 768 : false);
  React.useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return isMobile;
}

function completedCount(state) {
  return Object.values(state.habits || {}).filter(h => h.completed).length;
}

function getRank(state) {
  const xp = state.totalPoints || 0;
  /*
   * XP MATH (точный расчёт):
   * 48 привычек × 7 дней × 10 XP = 3 360 XP (привычки)
   * 48 недель × 7 дней × 5 XP = 1 680 XP (ежедневные показатели)
   * Итого максимум программы = 5 040 XP за ~11 активных месяцев
   * Месяц 12 = повторение пройденного (review-цикл)
   *
   * Пороги уровней (~равномерно по месяцам):
   * L1:    0 XP  — старт
   * L2:  420 XP  — ~1 месяц (4 привычки × 7д × 10XP + метрики)
   * L3: 1260 XP  — ~3 месяца
   * L4: 2520 XP  — ~6 месяцев (середина пути)
   * L5: 3780 XP  — ~9 месяцев
   * L6: 5040 XP  — полная программа завершена (Мастер Икигай)
   */
  if (xp >= 5040 || (state.currentCycle >= 4 && state.currentWeek >= 12)) return {title:'Мастер Икигай', next:'Годовая программа завершена 👑', level:6};
  if (xp >= 3780) return {title:'Проводник Икигай', next:`До Мастера: ${5040 - xp} XP`, level:5};
  if (xp >= 2520) return {title:'Архитектор привычек', next:`До Проводника: ${3780 - xp} XP`, level:4};
  if (xp >= 1260) return {title:'Исследователь вектора', next:`До Архитектора: ${2520 - xp} XP`, level:3};
  if (xp >= 420)  return {title:'Практик Икигай', next:`До Исследователя: ${1260 - xp} XP`, level:2};
  return {title:'Начало пути', next:`До Практика: ${420 - xp} XP`, level:1};
}

function trialDaysLeft(state) {
  if (!state.onboarded) return null; // not onboarded yet
  // Always 30 days from joinDate, regardless of stored trialDays value
  const join = new Date(state.joinDate || new Date());
  const now = new Date();
  const daysPassed = Math.floor((now - join) / 86400000);
  const daysLeft = Math.max(0, 30 - daysPassed);
  // Safety cap: never show more than 30 (fixes old stored states)
  return Math.min(30, daysLeft);
}

// Product day resets at 4:00 AM — buffer for late-night check-ins
const todayStr = () => {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 1); // before 4am = still "yesterday"
  return now.toISOString().slice(0,10); // YYYY-MM-DD
};
const yesterdayStr = () => {
  const now = new Date();
  if (now.getHours() < 4) now.setDate(now.getDate() - 2); else now.setDate(now.getDate() - 1);
  return now.toISOString().slice(0,10);
};

  energyLevel: 7, clarityLevel: 6, stabilityLevel: 7,

const HABIT_STORAGE_KEY = 'levelup_ikigai_habits_state_v1';
const DIAGNOSTIC_PROFILE_KEY = 'levelup_habit_profile';
const urlParams = new URLSearchParams(window.location.search);

const BACKEND_API_BASE = window.location.hostname === 'localhost' && window.location.port === '3000'
  ? 'http://localhost:3001'
  : window.location.origin;

function readJson(key) {
  try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch(e) { return null; }
}

function saveStateSnapshot(state) {
  try { localStorage.setItem(HABIT_STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getDiagnosticProfile() {
  const stored = readJson(DIAGNOSTIC_PROFILE_KEY) || {};
  if (!cameFromDiagnosis && !stored.source) return null;
  return {
    source: stored.source || 'levelup-ikigai',
    weakZone: stored.weakZone || urlParams.get('zone') || 'profession',
    archetype: stored.archetype || 'Стартап-лидер / Продукт-менеджер',
    topRole: stored.topRole || urlParams.get('role') || 'Продуктовый стратег',
    strengths: stored.strengths || ['стратегическое мышление','структурирование сложных задач','спокойная убедительность'],
    faceInsight: stored.faceInsight || 'Визуальный анализ показывает собранность, наблюдательность и аккуратную коммуникацию.',
    voiceInsight: stored.voiceInsight || 'Голосовой анализ показывает потенциал уверенной экспертной подачи и спокойной аргументации.',
    trialDays: 30,
  };
}

const LS = new Set();
const upd = fn => { S = fn(S); saveStateSnapshot(S); LS.forEach(f => f()); };

function useStore() {
  const [, tick] = useState(0);
  useEffect(() => {
    const f = () => tick(n => n+1);
    LS.add(f); return () => LS.delete(f);
  }, []);

  return {
    s: S,

    completeOnboarding: useCallback((name, weakZone, mode='direct', profile=null) => {
      upd(s => ({ ...s, onboarded:true, name, ikigaiWeakZone:weakZone,
        entryMode: mode,
        trialDays: 30,
        subscriptionPrice: '$8',
        diagnosticProfile: profile,
        personalHabit: mode === 'diagnosis' ? buildPersonalHabit(profile) : null,
        activeScreen:'dashboard',
        joinDate: new Date().toISOString(), currentWeek:1, currentCycle:1, streakDays:0 }));
    }, []),

    setScreen: useCallback((screen) => upd(s => ({ ...s, activeScreen:screen })), []),

    updateName: useCallback((name) => upd(s => ({ ...s, name })), []),

    updateIkigaiZone: useCallback((zone) => upd(s => ({ ...s, ikigaiWeakZone:zone })), []),

    advanceWeek: useCallback(() => {
      upd(s => {
        let { currentWeek: w, currentCycle: c } = s;
        const cycle = CYCLES[c-1];
        const habit = cycle?.habits[w-1];
        if (!habit) return s;
        const hState = s.habits[habit.id] || {};
        const dates = hState.completedDates || [];
        const uniqueDays = new Set(dates).size;
        if (uniqueDays < 7) return { ...s, _weekAdvanceError: `Нужно ещё ${7 - uniqueDays} дней отметок` };

        // Save completed week to history
        const pct = Math.round((uniqueDays / 7) * 100);
        const completedWeeks = [
          ...(s.completedWeeks || []),
          {
            cycle: c, week: w, title: habit.title,
            pct, xpEarned: uniqueDays * 10,
            date: new Date().toISOString(),
            insight: hState.insight || '',
          }
        ];

        // Advance
        let newW = w, newC = c;
        if (w < 12) { newW = w + 1; }
        else if (c < 4) { newW = 1; newC = c + 1; }

        // Reset THIS week's completedDates (but keep insight)
        const updatedHabit = { ...hState, completedDates: [], completed: false };

        return {
          ...s,
          currentWeek: newW, currentCycle: newC,
          completedWeeks,
          habits: { ...s.habits, [habit.id]: updatedHabit },
          weeklyFreezes: 1,       // reset freeze each new week
          weekStartDate: new Date().toISOString(),
          _weekAdvanceError: null,
          _showWeekComplete: { cycle: c, week: w, title: habit.title, pct, xpEarned: uniqueDays * 10 },
        };
      });
    }, []),

    dismissWeekComplete: useCallback(() => {
      upd(s => ({ ...s, _showWeekComplete: null }));
    }, []),

    // Mark habit for TODAY (daily, same habit repeats 7 days)
    markHabitToday: useCallback((habitId) => {
      upd(s => {
        const today = todayStr();
        const cur = s.habits[habitId] || { habitId, completed: false, insight: '', completedDates: [] };
        const dates = cur.completedDates || [];
        // Toggle: if already marked today, unmark
        const alreadyToday = dates.includes(today);
        const newDates = alreadyToday ? dates.filter(d => d !== today) : [...dates, today];
        const uniqueDays = new Set(newDates).size;
        // XP: +10 when marking, -10 when unmarking (only if not already awarded today)
        const pointsDelta = alreadyToday ? -10 : 10;
        // Streak logic
        let { streakDays, lastActivityDate } = s;
        if (!alreadyToday) {
          if (!lastActivityDate) { streakDays = 1; }
          else if (lastActivityDate === today) { /* same day, no change */ }
          else if (lastActivityDate === yesterdayStr()) { streakDays = streakDays + 1; }
          else { streakDays = 1; }
          lastActivityDate = today;
        }
        return {
          ...s,
          habits: { ...s.habits, [habitId]: { ...cur, completedDates: newDates, completed: uniqueDays >= 7 } },
          totalPoints: Math.max(0, (s.totalPoints || 0) + pointsDelta),
          streakDays, lastActivityDate,
        };
      });
    }, []),

    updateHabit: useCallback((habitId, updates) => {
      upd(s => {
        const cur = s.habits[habitId] || { habitId, completed: false, insight: '', completedDates: [] };
        return { ...s, habits: { ...s.habits, [habitId]: { ...cur, ...updates } } };
      });
    }, []),

    updateInsight: useCallback((habitId, insight) => {
      upd(s => ({
        ...s,
        habits: { ...s.habits, [habitId]: {
          ...(s.habits[habitId] || {habitId,completed:false,insight:'',completedDates:[]}),
          insight,
          insightDate: new Date().toISOString(),
        }}
      }));
    }, []),

    updateMetrics: useCallback((e,c,st) => upd(s => {
      const today = todayStr();
      const award = s.lastMetricsAwardDate === today ? 0 : 5;
      return {
        ...s,
        energyLevel:e, clarityLevel:c, stabilityLevel:st,
        lastMetricsUpdate: new Date().toISOString(),
        lastMetricsAwardDate: today,
        totalPoints: Math.max(0, (s.totalPoints || 0) + award)
      };
    }), []),

    setReminderTime: useCallback((t) => upd(s => ({ ...s, reminderTime:t })), []),

    toggleReminder: useCallback(() => upd(s => ({ ...s, reminderEnabled: !s.reminderEnabled })), []),

    updateAvatar: useCallback((avatarDataUrl) => upd(s => ({ ...s, avatarDataUrl })), []),
    updatePaymentMethod: useCallback((status='ready_for_stripe') => upd(s => ({ ...s, paymentMethodStatus: status })), []),

    useFreeze: useCallback(() => {
      upd(s => {
        if ((s.weeklyFreezes || 0) < 1) return s;
        // Give credit for today's missed check-in
        const today = todayStr();
        const cycle = CYCLES[s.currentCycle-1];
        const habit = cycle?.habits[s.currentWeek-1];
        if (!habit) return s;
        const hState = s.habits[habit.id] || { habitId: habit.id, completed: false, insight: '', completedDates: [] };
        const dates = hState.completedDates || [];
        if (dates.includes(today)) return s; // already marked
        const newDates = [...dates, today];
        const uniqueDays = new Set(newDates).size;
        return {
          ...s,
          weeklyFreezes: s.weeklyFreezes - 1,
          habits: { ...s.habits, [habit.id]: { ...hState, completedDates: newDates, completed: uniqueDays >= 7 } },
          totalPoints: (s.totalPoints || 0) + 10,
        };
      });
    }, []),

    resetToOnboarding: useCallback(() => {
      try { localStorage.removeItem(HABIT_STORAGE_KEY); } catch(e) {}
      upd(() => ({ ...DEFAULT }));
    }, []),
  };
}

  { zone:'mission',    q:'Насколько ты чувствуешь, что твои действия важны для других людей?', icon:'🌍' },

  { zone:'profession', q:'Насколько ты доволен(а) тем, как деятельность приносит доход?', icon:'💰' },
];
const OPTS = ['Почти никогда','Редко','Иногда','Часто','Каждый день'];

function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0); // 0=name, 1=diagnosis choice, 2=quiz, 3=done
  const [name, setName] = useState('');
  const [scores, setScores] = useState({});
  const [quizStep, setQuizStep] = useState(0);
  const profile = getDiagnosticProfile();
  const hasDiagnosis = Boolean(profile);

  const handleName = () => { if (name.trim()) setStep(1); };
  const useDiagnosis = () => {
    if (!profile) return;
    setStep(3);
    setTimeout(() => onComplete(name.trim(), profile.weakZone || 'profession', 'diagnosis', profile), 900);
  };
  const startQuiz = () => { setScores({}); setQuizStep(0); setStep(2); };

  const handleQuiz = (score) => {
    const zone = QUIZ[quizStep].zone;
    const ns = { ...scores, [zone]: score };
    setScores(ns);
    if (quizStep < 3) { setQuizStep(q => q+1); }
    else {
      const weakZone = Object.entries(ns).sort((a,b) => a[1]-b[1])[0][0];
      setStep(3);
      setTimeout(() => onComplete(name.trim(), weakZone, 'direct', null), 1200);
    }
  };

  const bg = 'min-h-screen flex items-center justify-center p-4';

  if (step === 0) return (
    <div className={bg} style={bg2}>
      <div className="gc p-8 max-w-md w-full slide-in text-center">
        <div className="mb-4 flex justify-center"><div style={{width:88,height:88,borderRadius:'50%',overflow:'hidden',background:'#0d2137',boxShadow:'0 0 30px rgba(0,212,255,0.25)'}}><PenguinIcon size={88} /></div></div>
        <h1 className="text-3xl font-bold mb-2" style={{fontFamily:'Space Grotesk'}}>
          <span className="gt">ORKEN.LIFE</span>
        </h1>
        <p className="text-slate-400 text-sm mb-6">Трекер превращает выводы Икигай в ежедневные действия</p>
        <div className="text-left mb-6">
          <label className="text-xs text-slate-500 mb-2 block">Как Вас зовут?</label>
          <input
            className="gi px-4 py-3 text-sm"
            placeholder="Введите имя..."
            value={name} onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleName()}
            autoFocus
          />
          <p className="text-xs text-slate-600 mt-2">Имя нужно только для персонального обращения в трекере.</p>
        </div>
        <button className="bp w-full py-3 text-sm" onClick={handleName} disabled={!name.trim()}>
          Продолжить →
        </button>
      </div>
    </div>

  if (step === 1) return (
    <div className={bg} style={bg2}>
      <div className="gc p-8 max-w-lg w-full slide-in">
        <div className="text-center mb-6">
          <div className="text-xs text-cyan-400 mb-2" style={{letterSpacing:2}}>НАСТРОЙКА ПЛАНА</div>
          <h2 className="text-2xl font-bold text-slate-100 mb-3" style={{fontFamily:'Space Grotesk'}}>

          <p className="text-sm text-slate-500 leading-relaxed">
            Можно развивать навыки, которые предложил полный отчет диагностики, или пройти короткий опрос и собрать базовый маршрут привычек.
          </p>
        </div>
        <div className="grid gap-3">
          <button onClick={useDiagnosis} disabled={!hasDiagnosis}
            className="gc text-left p-4 rounded-2xl hover:border-cyan-500/40 transition-all disabled:opacity-45 disabled:cursor-not-allowed">
            <div className="text-sm font-bold text-slate-100 mb-1">Развивать навыки из полного отчета</div>

const METRIC_LEVELS = [
  { max:3,  label:'Низкий',   emoji:'😔', tip:'Требует внимания' },
  { max:5,  label:'Средний',  emoji:'😐', tip:'Есть куда расти'  },
  { max:7,  label:'Хорошо',   emoji:'🙂', tip:'Хороший уровень'  },
  { max:9,  label:'Отлично',  emoji:'😊', tip:'Отличное состояние'},
  { max:10, label:'Пик',      emoji:'🚀', tip:'Ты в потоке!'      },
];
const getLevel = v => METRIC_LEVELS.find(l => v <= l.max) || METRIC_LEVELS[4];

const getWellnessInsight = (e, c, st) => {
  const avg = (e + c + st) / 3;
  if (e <= 3) return { text: 'Энергия на минимуме — сфокусируйся на восстановлении и сне.', icon: '😴', color: '#ef4444' };
  if (c <= 3) return { text: 'Ясность снижена — попробуй медитацию, прогулку или цифровой детокс.', icon: '🌫️', color: '#f59e0b' };
  if (st <= 3) return { text: 'Устойчивость требует внимания — стабилизируй режим дня.', icon: '⚠️', color: '#f59e0b' };
  if (avg >= 8.5) return { text: 'Ты в отличной форме — идеальное время для новых вызовов!', icon: '🚀', color: '#10b981' };
  if (avg >= 6.5) return { text: 'Хорошее состояние. Поддерживай ритм — ты движешься вперёд.', icon: '✨', color: '#00d4ff' };
  return { text: 'Стабильное состояние. Обрати внимание на самый низкий показатель.', icon: '🎯', color: '#a855f7' };
};

          })}
        </div>
      </div>

  );
}

` +

function AINavigator() {
  const { s } = useStore();
  const cycle = CYCLES[s.currentCycle-1];
  const cycleHabit = cycle?.habits[s.currentWeek-1];
  const activeHabit = s.entryMode === 'diagnosis' && s.personalHabit ? s.personalHabit : cycleHabit;
  const activeHabitState = activeHabit ? (s.habits[activeHabit.id] || {}) : {};

  const navigatorContext = (mode='chat') => ({
    name: s.name,
    mode,
    cycle: cycle ? `${cycle.sub} — ${cycle.title}` : '',
    week: s.currentWeek,
    habit: activeHabit?.title || '',
    weakZone: ZONES[s.ikigaiWeakZone]?.name || s.ikigaiWeakZone,
    topRole: s.diagnosticProfile?.topRole || s.personalHabit?.focus || '',
    energy: s.energyLevel,
    clarity: s.clarityLevel,
    stability: s.stabilityLevel,
    streakDays: s.streakDays,
    careerAction: s.diagnosticProfile?.careerAction || s.personalHabit?.practice || '',
    recentInsight: activeHabitState.insight || ''
  });

  const [msgs, setMsgs] = useState([{
    id:'1', role:'assistant',
    text:`Привет, ${s.name}! Я Пингви — твой AI-навигационный помощник ORKEN.LIFE.\n\nСейчас ты на ${cycle?.sub} — «${cycle?.title}», неделя ${s.currentWeek}. Задача недели — «${activeHabit?.title}».\n\nМогу помочь с состоянием, путем развития или просто поговорить.`,
    ts: new Date()
  }]);
  const [input, setInput] = useState('');
  // Pick up pre-filled message from Metrics card "Спросить Пингви"
  useEffect(() => {
    if (window.__pingviPreFill) {
      setInput(window.__pingviPreFill);
      window.__pingviPreFill = null;
    }
  }, []);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [msgs, loading]);

  const QUICK = [
    'Как не сдаться?',
    'Устал(а), что делать?',
    'Как найти мотивацию?',
    'Расскажи про мою зону',
    'Помоги с привычкой',
    'Что делать, если нет времени?',
    'Оцени мой прогресс',
    'Расскажи про Икигай',
  ];

  // Template conversations
  const TEMPLATES = [
    { label: '📊 Улучшить состояние', mode:'state', msg: `Мои показатели: энергия ${s.energyLevel}/10, ясность ${s.clarityLevel}/10, устойчивость ${s.stabilityLevel}/10. Что мне улучшить сегодня?` },
    { label: '🧭 Путь развития', mode:'path', msg: `Помоги мне продолжить путь развития по моей диагностике и текущей привычке.` },
    { label: '💬 Просто поболтать', mode:'chat', msg: `Хочу просто поговорить. Задай мне хороший вопрос.` },
    { label: '🌅 Утренний чек-ин', mode:'state', msg: `Доброе утро! Сегодня ${new Date().toLocaleDateString('ru-RU', {weekday:'long'})}. Помоги мне настроиться на день.` },
    { label: '🎯 Фокус на неделю', mode:'path', msg: `Какой главный фокус для меня на этой неделе, исходя из моей привычки и показателей?` },
    { label: '🌱 Про мой Икигай', mode:'path', msg: `Расскажи мне подробнее про зону "${ZONES[s.ikigaiWeakZone]?.name}" в Икигай. Почему это важно для меня?` },
  ];

  const send = async (text, mode='chat') => {
    if (!text.trim() || loading) return;

    const userMsg = { id: Date.now().toString(), role:'user', text: text.trim(), ts: new Date() };
    setMsgs(p => [...p, userMsg]);
    setInput('');
    setLoading(true);
    setError('');

    try {
      const res = await fetch(`${BACKEND_API_BASE}/api/habits/navigator`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          message: userMsg.text,
          messages: msgs.slice(-10).map(m => ({ role:m.role, text:m.text })),
          context: navigatorContext(mode)
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'AI Навигатор временно недоступен');
      const reply = data.reply || 'Не смог ответить, попробуй ещё раз.';
      setMsgs(p => [...p, {id:(Date.now()+1).toString(),role:'assistant',text:reply,ts:new Date()}]);
    } catch(e) {
      setError('Ошибка: ' + e.message);
    } finally {
      setLoading(false);
    }
  };

  return (

function Settings() {
  const { s, updateName, updateIkigaiZone, setReminderTime, toggleReminder, updateAvatar, updatePaymentMethod, resetToOnboarding } = useStore();
  const [localName, setLocalName] = useState(s.name);
  useEffect(() => { setLocalName(s.name); }, [s.name]);
  const [saved, setSaved] = useState(false);
  const [showReset, setShowReset] = useState(false);
  const [activeTab, setActiveTab] = useState('profile');
  const [stripeCard, setStripeCard] = useState({number:'',expiry:'',cvc:'',name:''});
  const [cardSaved, setCardSaved] = useState(false);
  const avatarRef = React.useRef(null);
  const rank = getRank(s);
  const daysLeft = trialDaysLeft(s);

  const handleSave = () => {
    if (localName.trim()) updateName(localName.trim());
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  const handleAvatarChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => updateAvatar(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleCardSave = () => {
    if (stripeCard.number.length >= 16) {
      updatePaymentMethod('ready_for_stripe');
      setCardSaved(true);
      setTimeout(()=>setCardSaved(false),3000);
    }

  const TABS = [

                      const v = e.target.value.replace(/\D/g,'').slice(0,16);
                      const fmt = v.replace(/(\d{4})/g,'$1 ').trim();
                      setStripeCard(p=>({...p,number:fmt}));
                    }}
                    className="gi px-4 py-2.5 text-sm" />
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="text-xs text-slate-500 mb-1 block">Срок (ММ/ГГ)</label>
                    <input type="text" placeholder="12/27" maxLength={5} value={stripeCard.expiry}
                      onChange={e=>{
                        let v = e.target.value.replace(/\D/g,'').slice(0,4);
                        if(v.length>2) v = v.slice(0,2)+'/'+v.slice(2);
                        setStripeCard(p=>({...p,expiry:v}));
                      }}
                      className="gi px-4 py-2.5 text-sm" />
                  </div>
                  <div>
                    <label className="text-xs text-slate-500 mb-1 block">CVV</label>
                    <input type="password" placeholder="•••" maxLength={4} value={stripeCard.cvc}

                      className="gi px-4 py-2.5 text-sm" />
                  </div>
                </div>
                <button onClick={handleCardSave}
                  disabled={stripeCard.number.replace(/\s/g,'').length < 16}

                <p className="text-xs text-slate-600 text-center">Защищено SSL шифрованием · Данные хранятся в Stripe</p>
              </div>
            )}
          </div>

          <div className="gc p-5">
            <div className="text-sm font-semibold text-slate-200 mb-3">Что включено в подписку</div>
            <div className="space-y-2">
              {['Неограниченный доступ ко всем 48 привычкам','AI-наставник Пингви всегда онлайн','Персональный трекер прогресса','Геймификация и система XP/звания','Архив инсайтов и достижений','Приоритетные обновления'].map(feat => (
                <div key={feat} className="flex items-center gap-2 text-sm text-slate-300">
                  <span className="text-green-400">✓</span> {feat}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* REMINDERS TAB */}
      {activeTab === 'reminders' && (
        <div className="space-y-5">
          <div className="gc p-5">
            <div className="flex items-center justify-between mb-4">
              <div>
                <div className="text-sm font-semibold text-slate-200">🔔 Напоминания</div>
                <div className="text-xs text-slate-500 mt-0.5">Ненавязчивые напоминания о практике</div>
              </div>
              <button onClick={toggleReminder}
                className={`w-12 h-6 rounded-full transition-all relative ${s.reminderEnabled?'bg-cyan-500':'bg-white/10'}`}>
                <div className={`absolute top-1 w-4 h-4 rounded-full bg-white transition-all duration-300 ${s.reminderEnabled?'left-7':'left-1'}`} />
              </button>
            </div>
            {s.reminderEnabled && (
              <div className="space-y-3">
                <div>
                  <label className="text-xs text-slate-500 mb-2 block">Время напоминания</label>
                  <input type="time" value={s.reminderTime} onChange={e=>setReminderTime(e.target.value)}
                    className="gi px-4 py-2.5 text-sm w-auto" />
                </div>
                {/* Google Calendar */}
                <div className="p-4 rounded-xl" style={{background:'rgba(66,133,244,0.08)',border:'1px solid rgba(66,133,244,0.25)'}}>
                  <div className="flex items-center gap-2 mb-2">
                    <span>📅</span>
                    <span className="text-sm font-semibold" style={{color:'#4285f4'}}>Добавить в Google Календарь</span>
                  </div>
                  <p className="text-xs text-slate-400 mb-3">
                    Открывает Google Календарь с готовым повторяющимся событием — 7 дней для текущей привычки.
                  </p>
                  <button onClick={() => {
                    const t = s.reminderTime || '09:00';
                    const [h, m] = t.split(':').map(Number);
                    const now = new Date();
                    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
                    const end = new Date(start.getTime() + 15*60000);
                    const fmt = d => d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
                    const title = encodeURIComponent('✦ IKIGAI: Привычка дня');
                    const details = encodeURIComponent('Ежедневная отметка привычки · IKIGAI by ORKEN.LIFE');
                    const rrule = encodeURIComponent('RRULE:FREQ=DAILY;COUNT=7');
                    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(start)}/${fmt(end)}&details=${details}&recur=${rrule}&sf=true&output=xml`,'_blank');
                  }} style={{background:'#4285f4',color:'#fff'}} className="w-full py-2 rounded-xl text-sm font-semibold">
                    📅 Открыть Google Календарь
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

            {icon:'✦', val:data.title.split(' ').slice(0,2).join(' '), label:'привычка'},
          ].map((s,i)=>(
            <div key={i} className="p-3 rounded-xl" style={{background:'rgba(255,255,255,0.04)'}}>
              <div className="text-lg">{s.icon}</div>
              <div className="text-sm font-bold text-slate-200">{s.val}</div>
              <div className="text-xs text-slate-500">{s.label}</div>
            </div>
          ))}
        </div>

        {/* Progress bar */}
        <div className="h-2 rounded-full bg-white/5 overflow-hidden mb-2">
          <div className="h-full rounded-full transition-all duration-1000"
            style={{width:`${pct}%`, background:`linear-gradient(90deg,${statusColor}88,${statusColor})`}} />
        </div>
        <p className="text-xs text-slate-500 mb-5">
          {pct < 100 ? 'Нормальный темп адаптации. Главное — не бросать.' : 'Идеальное выполнение! Ты в настоящем потоке.'}
        </p>

        {/* Buttons */}
        <div className="space-y-2">
          <button onClick={()=>{navigator.clipboard?.writeText(shareText);}}
            className="w-full py-2.5 rounded-xl text-sm gc text-slate-300 hover:text-cyan-400 transition-colors">
            ↗ Поделиться результатом
          </button>
          {data.week === 1 && data.cycle === 1 && (
            <div className="p-3 rounded-xl mb-2 text-xs text-center"
              style={{background:'rgba(245,158,11,0.1)',border:'1px solid rgba(245,158,11,0.25)',color:'#fbbf24'}}>
              🎯 Первая привычка внедрена! Ещё 47 впереди — разблокируй полный год трансформации.
            </div>
          )}
          <button onClick={onDismiss}
            className="w-full py-2.5 rounded-xl text-sm font-semibold bp">
            Открыть следующую привычку →
          </button>
        </div>
      </div>
    </div>
  );
}

/* ==================== SUBSCRIPTION UPGRADE ==================== */
function SubscriptionUpgrade() {
  const { s, setScreen } = useStore();
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(2,11,24,0.97)'}}>
      <div className="max-w-md w-full text-center space-y-6">
        <div className="text-5xl">👑</div>
        <div>
          <div className="text-2xl font-bold text-slate-100 mb-2" style={{fontFamily:'Space Grotesk'}}>
            Пробный период завершён
          </div>
          <p className="text-slate-400 text-sm">
            Ты прошёл(шла) {(s.completedWeeks||[]).length} {(s.completedWeeks||[]).length===1?'неделю':'недель'} и набрал(а) <span className="text-amber-400 font-bold">{s.totalPoints} XP</span>.
            Продолжи путь к Мастеру Икигай 👑
          </p>
        </div>
        <div className="gc p-5 text-left space-y-2">
          {['Полный доступ ко всем 48 привычкам','AI-наставник Пингви всегда онлайн','История инсайтов и зал славы','Система XP и звания','Поддержка изменений на весь год'].map(f=>(
            <div key={f} className="flex items-center gap-2 text-sm text-slate-300">
              <span className="text-green-400">✓</span>{f}
            </div>
          ))}
        </div>
        <div>
          <button onClick={()=>setScreen('settings')}
            className="bp w-full py-3 text-base font-bold mb-3">
            💳 Подключить подписку — $8/мес
          </button>
          <p className="text-xs text-slate-600">Отмена в любой момент · Защита данных SSL</p>
        </div>
      </div>
    </div>
  );
}

/* ==================== APP ==================== */
function App() {
  // Version check: show reload toast if app updated
  React.useEffect(() => {
    const CURRENT_VERSION = '1.0.4';
    const stored = localStorage.getItem('_ikigai_app_version');
    if (stored && stored !== CURRENT_VERSION) {
      const toast = document.createElement('div');
      toast.textContent = '🔄 Доступно обновление — обновите страницу';
      Object.assign(toast.style, {position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%)',background:'rgba(2,11,24,0.95)',border:'1px solid rgba(0,212,255,0.25)',color:'#00d4ff',padding:'10px 20px',borderRadius:'12px',zIndex:'9999',fontSize:'13px',cursor:'pointer',backdropFilter:'blur(8px)'});
      toast.onclick = () => location.reload();
      document.body.appendChild(toast);
      setTimeout(()=>toast.remove(), 8000);
    }
    localStorage.setItem('_ikigai_app_version', CURRENT_VERSION);
  }, []);
  const { s, setScreen, completeOnboarding, dismissWeekComplete } = useStore();
  const isMobile = useIsMobile();
  const [mobileOpen, setMobileOpen] = useState(false);
  const [celebrationStreak, setCelebrationStreak] = useState(0);

  // Inject styles
  useEffect(() => {
    let el = document.getElementById('ik-css');
    if (!el) {
      el = document.createElement('style');
      el.id = 'ik-css';
      document.head.appendChild(el);
    }
    el.textContent = CSS;
  }, []);

  // Streak celebration at 7, 14, 21, 30
  useEffect(() => {
    if ([7,14,21,30].includes(s.streakDays) && celebrationStreak !== s.streakDays) {
      setCelebrationStreak(s.streakDays);
      setTimeout(() => setCelebrationStreak(0), 4000);
    }
  }, [s.streakDays]);

  if (!s.onboarded) {
    return <Onboarding onComplete={completeOnboarding} />;
  }

  const renderScreen = () => {
    switch(s.activeScreen) {
      case 'dashboard': return <Dashboard />;
      case 'journey':   return <Journey />;
      case 'habits':    return <HabitsScreen />;
      case 'archive':   return <Archive />;
      case 'navigator': return <AINavigator />;
      case 'settings':  return <Settings />;
      case 'guide':     return <GuideScreen />;
      default:          return <Dashboard />;
    }
  };

  // Trial check
  const daysLeft = trialDaysLeft(s);
  const trialExpired = daysLeft !== null && daysLeft <= 0 && s.paymentMethodStatus !== 'ready_for_stripe';

  const screenTitles = { dashboard:'Дашборд', journey:'Мой путь', habits:'Привычки', archive:'Архив', navigator:'AI Навигатор', settings:'Настройки', guide:'Гид' };

  return (
    <div className="min-h-screen relative" style={{background:'#020b18'}}>
      {/* Background */}
      <div className="fixed inset-0 pointer-events-none z-0">
        <div style={{position:'absolute',width:600,height:600,background:'radial-gradient(circle,rgba(0,212,255,0.05),transparent)',top:-150,left:-150,borderRadius:'50%'}} />
        <div style={{position:'absolute',width:500,height:500,background:'radial-gradient(circle,rgba(123,47,247,0.04),transparent)',bottom:50,right:-100,borderRadius:'50%'}} />
      </div>

      {/* Streak celebration */}
      {celebrationStreak > 0 && (
        <div className="fixed top-6 right-6 z-50 gc p-4 ap"
          style={{border:'1px solid rgba(0,212,255,0.4)',maxWidth:280,boxShadow:'0 0 30px rgba(0,212,255,0.2)'}}>
          <div className="flex items-center gap-3">
            <span className="fa text-3xl">🔥</span>
            <div>
              <div className="font-bold text-cyan-400">{celebrationStreak} дней подряд!</div>
              <div className="text-xs text-slate-400">Ты в отличной форме, продолжай!</div>
            </div>
          </div>
        </div>
      )}

      <Sidebar mobileOpen={mobileOpen} onClose={()=>setMobileOpen(false)} />

      {/* Trial expired wall */}
      {trialExpired && <SubscriptionUpgrade />}
      {/* Week complete celebration modal */}
      {s._showWeekComplete && (
        <WeekCompleteModal data={s._showWeekComplete} onDismiss={dismissWeekComplete} />
      )}

      <main style={{position:'relative',zIndex:10}}>
        {/* Mobile header */}
        <div className="md:hidden flex items-center justify-between px-4 py-3 sticky top-0 z-20"
          style={{background:'rgba(2,11,24,0.97)',backdropFilter:'blur(20px)',borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
          <button onClick={()=>setMobileOpen(true)} className="w-9 h-9 gc flex items-center justify-center text-slate-400">☰</button>
          <div className="flex items-center gap-2">
            <PenguinHeadIcon size={26} />
            <span className="font-bold gt text-sm" style={{fontFamily:'Space Grotesk'}}>{screenTitles[s.activeScreen]}</span>
          </div>
          <button onClick={()=>setScreen('navigator')} className="w-9 h-9 flex items-center justify-center relative overflow-hidden" style={{borderRadius:'50%',background:'#0d2137'}}>
            <PenguinIcon size={32} />
            <div className="absolute top-1 right-1 w-2 h-2 rounded-full bg-green-500 pg" />
          </button>
        </div>

        <div style={{marginLeft: isMobile ? 0 : 220, minHeight:'100vh'}}>
          {/* Desktop topbar */}
          <div className="hidden md:flex items-center justify-between px-6 py-4"
            style={{borderBottom:'1px solid rgba(255,255,255,0.05)',background:'rgba(2,11,24,0.6)',backdropFilter:'blur(10px)'}}>
            <span className="text-sm text-slate-400">{screenTitles[s.activeScreen]}</span>
            <div className="flex items-center gap-3">
              <div className="flex items-center gap-2 text-xs text-slate-500">
                <div className="w-2 h-2 rounded-full bg-green-500 pg" />
                <span>Пингви онлайн</span>
              </div>
              {(() => { const dl = trialDaysLeft(s); return dl !== null && dl >= 0 ? (
                <div className="flex items-center gap-2 px-3 py-1.5 rounded-xl text-xs"
                  style={{background:dl<=7?'rgba(239,68,68,0.12)':'rgba(0,212,255,0.08)',border:`1px solid ${dl<=7?'rgba(239,68,68,0.3)':'rgba(0,212,255,0.2)'}`,color:dl<=7?'#f87171':'#67e8f9'}}>
                  ⏳ {dl}/30 дней
                </div>
              ) : null; })()}
              <button onClick={()=>setScreen('navigator')} className="gc flex items-center gap-2 px-3 py-1.5 hover:border-cyan-500/30 transition-all text-xs text-slate-400">
                <PenguinHeadIcon size={20} /> AI Пингви
              </button>
              <div className="flex items-center gap-2 gc px-3 py-1.5">
                <span className="fa text-sm">🔥</span>
                <span className="text-sm font-bold text-orange-400">{s.streakDays}</span>
                <span className="text-xs text-slate-500">дней</span>
              </div>
            </div>
          </div>

          <div className="pb-24 md:pb-0">{renderScreen()}</div>
        </div>
      </main>

      {/* Mobile bottom nav */}
      <div className="md:hidden fixed bottom-0 left-0 right-0 z-20"
        style={{background:'rgba(2,11,24,0.98)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(255,255,255,0.05)'}}>
        <div className="flex">
          {[
            {id:'dashboard',icon:'⬡',label:'Главная'},
            {id:'journey',  icon:'🧭',label:'Путь'},
            {id:'habits',   icon:'✦', label:'Привычки'},
            {id:'navigator',icon:'NAV_PENGUIN',label:'Пингви'},
            {id:'guide',    icon:'📖',label:'Гид'},
          ].map(item => (
            <button key={item.id} onClick={()=>setScreen(item.id)}
              className="flex-1 flex flex-col items-center py-2.5 transition-all relative">
              {item.id==='navigator' && <div className="absolute top-0.5 right-1/2 translate-x-4 w-2 h-2 rounded-full bg-green-500 pg" />}
              <span className={`text-lg transition-all ${s.activeScreen===item.id?'scale-110':''}`} style={{display:'flex',justifyContent:'center'}}>{item.icon==='NAV_PENGUIN' ? <PenguinHeadIcon size={24} /> : item.icon}</span>
              <span className={`text-xs mt-0.5 ${s.activeScreen===item.id?'text-cyan-400 font-medium':'text-slate-600'}`}>{item.label}</span>
              {item.id==='habits' && (() => {
                const cyc = CYCLES[s.currentCycle-1];
                const hab = cyc?.habits[s.currentWeek-1];
                const days = hab ? new Set(s.habits[hab.id]?.completedDates||[]).size : 0;
                return days > 0 ? (
                  <span className="absolute top-1 right-1 text-xs w-4 h-4 rounded-full flex items-center justify-center font-bold"
                    style={{background:days>=7?'#10b981':'#00d4ff',color:'#020b18',fontSize:'8px'}}>
                    {days}
                  </span>
                ) : null;
              })()}
              {s.activeScreen===item.id && <div className="absolute bottom-0 w-6 h-0.5 rounded-full bg-cyan-400" />}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
