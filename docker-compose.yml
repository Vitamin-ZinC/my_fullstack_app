version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: levelup
      POSTGRES_USER: levelup
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://levelup:dev_password@postgres:5432/levelup
      REDIS_URL: redis://redis:6379
      PORT: 3001
      APP_ORIGIN: http://localhost:3000
      PUBLIC_API_URL: http://localhost:3001
      ADMIN_API_TOKEN: dev_admin_token
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-dev_admin_session_secret}
      DEV_TOOLS_ENABLED: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-ORKEN.LIFE <reports@orken.life>}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: npm --workspace apps/backend run worker
    environment:
      DATABASE_URL: postgresql://levelup:dev_password@postgres:5432/levelup
      REDIS_URL: redis://redis:6379
      PUBLIC_API_URL: http://localhost:3001
      DEV_TOOLS_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-whisper-1}
    depends_on:
      - postgres
      - redis
      - backend

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pg_data:
